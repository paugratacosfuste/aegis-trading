ensemble:
  regime: normal
  confidence_threshold: 0.60

risk:
  atr_period: 14
  atr_multipliers:
    low: 1.5
    normal: 2.0
    high: 2.5
    extreme: 3.0
  timeframe_adjustments:
    1m: 0.5
    5m: 0.6
    15m: 0.7
    1h: 1.0
    4h: 1.3
    1d: 1.8
  default_win_rate: 0.45
  default_avg_win: 0.02
  default_avg_loss: 0.015
