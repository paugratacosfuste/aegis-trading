mode: backtest
confidence_threshold: 0.45
max_risk_per_trade: 0.05
max_open_positions: 5
kelly_fraction: 0.5
daily_drawdown_halt: -0.15
weekly_drawdown_halt: -0.25
initial_capital: 5000.0

backtest:
  symbol: BTC/USDT
  timeframe: 1h
  start_date: "2025-04-01"
  end_date: "2026-04-01"
  commission_pct: 0.001

symbols:
  crypto:
    - BTC/USDT

database:
  host: localhost
  port: 5432
  dbname: aegis
  user: aegis
  password: aegis
  min_connections: 2
  max_connections: 5

risk:
  atr_period: 14
  atr_multipliers:
    low: 1.5
    normal: 2.0
    high: 2.5
    extreme: 3.0
  timeframe_adjustments:
    1m: 0.5
    5m: 0.6
    15m: 0.7
    1h: 1.0
    4h: 1.3
    1d: 1.8
  default_win_rate: 0.45
  default_avg_win: 0.02
  default_avg_loss: 0.015
