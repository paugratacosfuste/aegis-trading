    - {id: stat_03, strategy: zscore, params: {lookback: 100}}
    - {id: stat_04, strategy: ornstein_uhlenbeck, params: {lookback: 60}}
    - {id: stat_05, strategy: kalman, params: {process_noise: 0.01, measurement_noise: 1.0}}
    - {id: stat_06, strategy: bollinger_zscore, params: {period: 20}}
    - {id: stat_07, strategy: hurst_zscore, params: {lookback: 100}}
    - {id: stat_08, strategy: multi_window, params: {windows: [20, 50, 100]}}
    - {id: stat_09, strategy: sector_relative, params: {}}
    - {id: stat_10, strategy: pairs, params: {}}
  momentum:
